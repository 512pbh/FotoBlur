<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Filter: Cyber-Romantic Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #24142c 0%, #0f0c1b 100%);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white; overflow: hidden;
        }

        /* --- DASHBOARD STYLE --- */
        #dashboard {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px rgba(255, 255, 255, 0.1) solid;
            padding: 50px 40px; border-radius: 24px;
            text-align: center; max-width: 480px; width: 90%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.8s ease-out; z-index: 10;
        }
        #dashboard h1 {
            font-size: 2.2rem; margin: 0 0 10px 0; font-weight: 800;
            background: linear-gradient(45deg, #ff1493, #a855f7);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        #dashboard p {
            color: rgba(255, 255, 255, 0.7); font-size: 1rem;
            line-height: 1.6; margin: 0 0 35px 0;
        }
        .start-btn {
            background: linear-gradient(135deg, #ff1493 0%, #8b5cf6 100%);
            color: white; border: none; padding: 16px 35px;
            font-size: 1.1rem; font-weight: bold; border-radius: 50px;
            cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);
            letter-spacing: 0.5px;
        }
        .start-btn:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 8px 25px rgba(255, 20, 147, 0.6), 0 0 15px rgba(139, 92, 246, 0.4);
        }

        /* --- APP FILTER STYLE --- */
        #app-container {
            display: none; /* Sembunyikan kamera di awal */
            position: relative; width: 100vw; height: 100vh;
            justify-content: center; align-items: center;
        }
        #video_container {
            position: relative; width: 640px; height: 480px; z-index: 1;
        }
        video {
            width: 100%; height: 100%; border-radius: 20px; transform: scaleX(-1);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); transition: filter 0.3s ease;
            border: 2px rgba(255, 255, 255, 0.1) solid; background: #000;
        }
        canvas {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 2; pointer-events: none;
        }
        .info-text {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 20, 147, 0.85); color: white; padding: 12px 30px;
            border-radius: 30px; font-size: 16px; font-weight: bold; z-index: 10;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3); letter-spacing: 0.5px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="dashboard">
        <h1>✨ GESTURE FILTER ✨</h1>
        <p>Aplikasi filter interaktif bertenaga AI.<br>Silakan tekan tombol di bawah ini untuk masuk ke halaman foto blurr.</p>
        <button class="start-btn" id="entry-button">Masuk ke Aplikasi</button>
    </div>

    <div id="app-container">
        <div id="video_container">
            <video id="webcam" autoplay playsinline></video>
        </div>
        <canvas id="output_canvas"></canvas>
        <div class="info-text">Angkat 2 Jari (✌️) untuk Blur + ❤️</div>
    </div>

    <audio id="bgm" src="lagu.mp3" loop></audio>

    <script src="index.js"></script>
</body>
</html>
