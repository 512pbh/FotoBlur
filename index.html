<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Filter: 2 Jari Blur + ❤️ dari Bawah</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
        }

        .main-container {
            position: relative;
            width: 100vw; /* Gunakan lebar penuh layar */
            height: 100vh; /* Gunakan tinggi penuh layar */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #video_container {
            position: relative;
            width: 640px;
            height: 480px;
            z-index: 1; /* Video berada di bawah hati */
        }

        video {
            width: 100%;
            height: 100%;
            border-radius: 15px;
            transform: scaleX(-1); /* Efek cermin */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: filter 0.3s ease;
        }

        /* Efek blur ketika kondisi terpenuhi */
        video.blur-effect {
            filter: blur(25px) brightness(0.8);
        }

        /* Canvas dibuat memenuhi seluruh layar agar hati bisa muncul dari bawah */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2; /* Hati berada di atas video */
            pointer-events: none; /* Agar klik menembus canvas */
        }

        .info-text {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 20, 147, 0.8); /* Warna pink */
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            z-index: 10;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div id="video_container">
        <video id="webcam" autoplay playsinline></video>
    </div>
    
    <canvas id="output_canvas"></canvas>
    
    <div class="info-text">Angkat 2 Jari (✌️) untuk Blur + ❤️</div>
</div>

<script src="index.js"></script>
</body>
</html>
